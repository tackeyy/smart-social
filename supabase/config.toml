project_id = "rwbfafdivhzfzzwrkviy"

[auth]
site_url = "https://gyomu.ai"
additional_redirect_urls = [
  "https://gyomu.ai/smart-social/auth/callback",
  "http://localhost:3000/smart-social/auth/callback"
]

[auth.email]
enable_confirmations = true
max_frequency = "1m0s"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.smtp]
enabled = true
host = "smtp.resend.com"
port = 465
user = "resend"
pass = "env(RESEND_SMTP_PASSWORD)"
admin_email = "noreply@zeimu.ai"
sender_name = "Smart Social"
